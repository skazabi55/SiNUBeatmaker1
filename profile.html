<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil - BEATFORGE</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="db.js"></script>
    <script>checkAuth();</script>
    <style>
        .profile-body {
            min-height: 100vh;
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
        }

        /* Profile Header */
        .profile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 30px;
            background: rgba(5, 5, 15, 0.95);
            border-bottom: 1px solid rgba(0, 243, 255, 0.15);
            backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .profile-header .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem;
            font-weight: 900;
        }

        .profile-header .header-nav {
            display: flex;
            gap: 20px;
        }

        .profile-header .header-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }

        .profile-header .header-nav a:hover {
            color: var(--neon-cyan);
        }

        .profile-header .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Profile Content */
        .profile-content {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        /* Profile Card */
        .profile-card {
            background: rgba(10, 10, 30, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 40px;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-magenta), var(--neon-green));
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-magenta));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            color: #030305;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.3);
            position: relative;
        }

        .profile-avatar::after {
            content: '';
            position: absolute;
            inset: -3px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            animation: pulse-ring 2s infinite;
            pointer-events: none;
        }

        .profile-avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .avatar-wrapper {
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }

        .avatar-overlay {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.65);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            z-index: 2;
            pointer-events: none;
        }

        .avatar-wrapper:hover .avatar-overlay {
            opacity: 1;
        }

        .avatar-overlay .camera-icon {
            font-size: 1.8rem;
            margin-bottom: 4px;
        }

        .avatar-overlay .camera-text {
            font-size: 0.65rem;
            color: var(--neon-cyan);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .avatar-remove-btn {
            position: absolute;
            top: -5px;
            right: -5px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(239, 68, 68, 0.9);
            border: 2px solid #030305;
            color: white;
            font-size: 0.75rem;
            font-weight: 900;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
            transition: transform 0.2s;
        }

        .avatar-remove-btn:hover {
            transform: scale(1.15);
            background: #ef4444;
        }

        @keyframes pulse-ring {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        .profile-info {
            flex: 1;
        }

        .profile-info h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .profile-info .username-tag {
            color: var(--neon-cyan);
            font-size: 0.95rem;
            margin-bottom: 15px;
            display: block;
        }

        .profile-info .email-tag {
            color: var(--text-secondary);
            font-size: 0.8rem;
            margin-bottom: 20px;
            display: block;
        }

        .profile-stats {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-item .stat-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--neon-magenta);
            display: block;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.4);
        }

        .stat-item .stat-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Section Titles */
        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.15);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title span {
            font-size: 1.3rem;
        }

        /* Beat Cards Grid */
        .beats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .beat-card {
            background: rgba(10, 10, 30, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 12px;
            padding: 25px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .beat-card:hover {
            border-color: var(--neon-cyan);
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(0, 243, 255, 0.15);
        }

        .beat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .beat-card:hover::before {
            opacity: 1;
        }

        .beat-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .beat-card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-primary);
        }

        .beat-card-bpm {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            border: 1px solid rgba(0, 243, 255, 0.3);
        }

        .beat-card-date {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        /* Mini Visualizer */
        .beat-visualizer {
            display: flex;
            gap: 2px;
            height: 30px;
            align-items: flex-end;
            margin-bottom: 15px;
            padding: 5px 0;
        }

        .viz-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-magenta));
            border-radius: 2px;
            min-height: 4px;
            opacity: 0.6;
            transition: opacity 0.3s;
        }

        .beat-card:hover .viz-bar {
            opacity: 1;
            animation: viz-pulse 0.6s ease-in-out infinite alternate;
        }

        @keyframes viz-pulse {
            from { transform: scaleY(0.8); }
            to { transform: scaleY(1.2); }
        }

        .beat-card-actions {
            display: flex;
            gap: 8px;
        }

        .beat-card-actions button {
            flex: 1;
            padding: 8px 12px;
            border-radius: 8px;
            font-family: 'Space Mono', monospace;
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid;
        }

        .btn-play-beat {
            background: rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3) !important;
            color: var(--neon-cyan);
        }

        .btn-play-beat:hover {
            background: rgba(0, 243, 255, 0.25);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .btn-studio-beat {
            background: rgba(255, 0, 255, 0.1);
            border-color: rgba(255, 0, 255, 0.3) !important;
            color: var(--neon-magenta);
        }

        .btn-studio-beat:hover {
            background: rgba(255, 0, 255, 0.25);
            box-shadow: 0 0 15px rgba(255, 0, 255, 0.2);
        }

        .btn-delete-beat {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3) !important;
            color: #ef4444;
            flex: 0.5;
        }

        .btn-delete-beat:hover {
            background: rgba(239, 68, 68, 0.25);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state .empty-icon {
            font-size: 4rem;
            margin-bottom: 15px;
            opacity: 0.3;
        }

        .empty-state p {
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .empty-state a {
            color: var(--neon-cyan);
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--neon-cyan);
            padding: 10px 25px;
            border-radius: 8px;
            transition: all 0.3s;
            display: inline-block;
        }

        .empty-state a:hover {
            background: rgba(0, 243, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
        }

        /* Edit Profile Section */
        .edit-profile-section {
            background: rgba(10, 10, 30, 0.7);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 16px;
            padding: 30px 40px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .edit-profile-section .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }

        .edit-profile-section .form-group {
            flex: 1;
        }

        .edit-profile-section label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .edit-profile-section input {
            width: 100%;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--text-primary);
            font-family: 'Space Mono', monospace;
            font-size: 0.9rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }

        .edit-profile-section input:focus {
            outline: none;
            border-color: var(--neon-cyan);
        }

        .edit-profile-section input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-save-profile {
            padding: 10px 30px;
            background: rgba(0, 243, 255, 0.15);
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-save-profile:hover {
            background: rgba(0, 243, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.3);
        }

        @media (max-width: 768px) {
            .profile-card {
                flex-direction: column;
                text-align: center;
            }
            .profile-stats {
                justify-content: center;
            }
            .beats-grid {
                grid-template-columns: 1fr;
            }
            .edit-profile-section .form-row {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="profile-body">

    <!-- Header -->
    <header class="profile-header">
        <div class="header-left" style="display:flex; align-items:center; gap:25px;">
            <div class="logo glitch" data-text="BEATFORGE">BEATFORGE</div>
            <nav class="header-nav">
                <a href="beatmaker.html">Stüdyo</a>
                <a href="profile.html" style="color: var(--neon-cyan);">Profil</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="daw-btn" onclick="logoutUser()">Çıkış Yap</button>
        </div>
    </header>

    <!-- Profile Content -->
    <div class="profile-content">

        <!-- Profile Card -->
        <div class="profile-card">
            <div class="avatar-wrapper" onclick="document.getElementById('avatarUpload').click()">
                <div class="profile-avatar" id="profileAvatar"></div>
                <div class="avatar-overlay">
                    <span class="camera-icon">📷</span>
                    <span class="camera-text">Fotoğraf Yükle</span>
                </div>
                <button class="avatar-remove-btn" id="avatarRemoveBtn" onclick="event.stopPropagation(); removeAvatar()" title="Fotoğrafı Kaldır">✕</button>
            </div>
            <input type="file" id="avatarUpload" accept="image/*" style="display:none;" onchange="handleAvatarUpload(event)">
            <div class="profile-info">
                <h1 id="profileNickname"></h1>
                <span class="username-tag" id="profileUsername"></span>
                <span class="email-tag" id="profileEmail"></span>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-value" id="statBeats">0</span>
                        <span class="stat-label">Beat</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statTotalSteps">0</span>
                        <span class="stat-label">Toplam Nota</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="statAvgBpm">0</span>
                        <span class="stat-label">Ort. BPM</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Profile -->
        <div class="edit-profile-section">
            <h3 class="section-title"><span>⚙️</span> Profil Düzenle</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>Görünen Ad (Nickname)</label>
                    <input type="text" id="editNickname">
                </div>
                <div class="form-group">
                    <label>Kullanıcı Adı</label>
                    <input type="text" id="editUsername" disabled>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>E-posta</label>
                    <input type="email" id="editEmail" disabled>
                </div>
                <div class="form-group">
                    <label>Rol</label>
                    <input type="text" id="editRole" disabled>
                </div>
            </div>
            <button class="btn-save-profile" onclick="saveProfileChanges()">Değişiklikleri Kaydet</button>
        </div>

        <!-- My Beats -->
        <h3 class="section-title"><span>🎵</span> Müziklerim</h3>
        <div class="beats-grid" id="beatsGrid">
            <!-- Beats will be loaded here by JS -->
        </div>

    </div>

    <script src="profile.js"></script>
</body>
</html>
